AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: the_coroner - Slack slash command Lambda

Globals:
  Function:
    Timeout: 60
    Runtime: nodejs20.x

Resources:
  PostmortemFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: the_coroner
      Handler: dist/handlers/postmortemHandler.handler
      CodeUri: .
      MemorySize: 1024
      Policies:
        - SSMParameterReadPolicy:
            ParameterName: "/notion-pm/*"
      Environment:
        Variables:
          SLACK_BOT_TOKEN: !Ref SlackBotTokenParam
          SLACK_SIGNING_SECRET: !Ref SlackSigningSecretParam
          NOTION_API_KEY: !Ref NotionApiKeyParam
          NOTION_INCIDENTS_PARENT_ID: !Ref NotionIncidentsParentIdParam
          CLAUDE_API_KEY: !Ref ClaudeApiKeyParam
          CLAUDE_MAX_TOKENS: !Ref ClaudeMaxTokensParam
          AWS_REGION: !Ref AWS::Region
      Events:
        Api:
          Type: Api
          Properties:
            Path: /generate-postmortem
            Method: ANY

Parameters:
  SlackBotTokenParam:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /notion-pm/slack-bot-token
  SlackSigningSecretParam:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /notion-pm/slack-signing-secret
  NotionApiKeyParam:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /notion-pm/notion-api-key
  NotionIncidentsParentIdParam:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /notion-pm/notion-incidents-parent-id
  ClaudeApiKeyParam:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /notion-pm/claude-api-key
  ClaudeMaxTokensParam:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /notion-pm/claude-max-tokens
